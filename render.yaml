services:
  - type: web
    name: triaje-postgres
    env: docker
    autoDeploy: false

  - type: web
    name: triaje-api
    env: docker
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_HOST
        value: triaje-postgres
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: triage_ia
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        value: postgres123
      - key: HCE_API_URL
        value: http://triaje-mock-hce:8001

  - type: web
    name: triaje-streamlit
    env: docker
    autoDeploy: true
    envVars:
      - key: API_URL
        value: http://triaje-api:5000

  - type: web
    name: triaje-mock-hce
    env: docker
    autoDeploy: true
    healthCheckPath: /health

  - type: web
    name: triaje-n8n
    env: docker
    autoDeploy: false