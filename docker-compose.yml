services:
  postgres:
    image: postgres:15-alpine
    container_name: triage_postgres
    environment:
      POSTGRES_DB: triage_ia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      TZ: America/Bogota
      PGTZ: America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/sql/seed_data.sql:/docker-entrypoint-initdb.d/2_seed_data.sql
    command: postgres -c timezone=America/Bogota
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: triage_n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_FORM_ERROR=all
      - GENERIC_TIMEZONE=America/Bogota
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./backend/n8n-workflows:/home/node/n8n-workflows
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mock_hce:
    build:
      context: ./backend/mock-hce
      dockerfile: Dockerfile
    container_name: triage_mock_hce
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s   # Espera 10s antes de empezar a contar fallos
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: triage_api
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=triage_ia
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - HCE_API_URL=http://mock_hce:8001
      - N8N_WEBHOOK_TRIAGE=http://n8n:5678/webhook/triaje-completado
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      mock_hce:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: ./frontend/streamlit
      dockerfile: Dockerfile
    container_name: triage_streamlit
    environment:
      - API_URL=http://api:5000
      - HCE_URL=http://mock_hce:8001
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data: